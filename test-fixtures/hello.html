<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello World</title>
<style>
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f5f5f5;
}
h1 { font-size: 3rem; color: #333; }
button {
  margin-top: 1.5rem;
  padding: 12px 32px;
  font-size: 1.1rem;
  border: none;
  border-radius: 8px;
  background: #4a90d9;
  color: #fff;
  cursor: pointer;
}
button:hover { background: #357abd; }
</style>
</head>
<body>
<h1>Hello World</h1>
<button onclick="alert('当前时间: ' + new Date().toLocaleString('zh-CN'))">显示当前时间</button>
</body>
</html>
